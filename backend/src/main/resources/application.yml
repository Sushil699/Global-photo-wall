server:
  port: ${PORT:8080}

spring:
  application:
    name: global-photo-wall
  config:
    import: optional:file:.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/global-photo-wall}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
  upload:
    max-size-bytes: 10485760
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp
  reports:
    hide-threshold: ${REPORTS_HIDE_THRESHOLD:1000}
